<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Squadra</title>

<link rel="stylesheet" th:href="@{/grafica.css}">
</head>

<body>

<div class="card">

    <h1>Nuova Squadra</h1>

    <form th:action="@{/squadre}" method="post" th:object="${squadra}">

        <label>Nome squadra</label>
        <input type="text" th:field="*{nome}" required>

        <label>Anno fondazione</label>
        <input type="number" th:field="*{annoFondazione}" required>

        <label>Città</label>
        <input type="text" th:field="*{citta}" required>
		
		<br><br>
        <button type="submit">Salva squadra</button>

    </form>

	<div class="back">
	    <a href="/admin"
	       style="display:inline-block;
	              margin-top:20px;
	              padding:10px 14px;
	              background:#0d6efd;
	              color:white;
	              border-radius:8px;
	              text-decoration:none;">
	        ← Indietro
	    </a>
	</div>
	
</div>

</body>
</html>
