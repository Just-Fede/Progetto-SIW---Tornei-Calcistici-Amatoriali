<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Giocatore</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .container {
            width: 520px;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        label {
            display: block;
            margin-top: 14px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.2);
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #357ab8;
            transform: translateY(-1px);
        }

        .section {
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Nuovo Giocatore</h1>

    <form th:action="@{/giocatori}" method="post" th:object="${giocatore}">

        <div class="section">
            <label>Nome</label>
            <input type="text" th:field="*{nome}" required>
        </div>

        <div class="section">
            <label>Cognome</label>
            <input type="text" th:field="*{cognome}" required>
        </div>

        <div class="section">
            <label>Data di nascita</label>
            <input type="date" th:field="*{data_nascita}" required>
        </div>

        <div class="section">
            <label>Ruolo</label>
            <input type="text" th:field="*{ruolo}" required>
        </div>

        <div class="section">
            <label>Altezza</label>
            <input type="number" step="0.01" th:field="*{altezza}">
        </div>

        <div class="section">
            <label>Squadra</label>
            <select th:field="*{squadraId}" required>
                <option value="" disabled selected>Seleziona una squadra</option>

                <option th:each="s : ${squadre}"
                        th:value="${s.id}"
                        th:text="${s.nome}">
                </option>
            </select>
        </div>

        <button type="submit">Salva Giocatore</button>

    </form>
	
	<div class="back">
	    <a href="/form/admin"
	       style="display:inline-block;
	              margin-top:20px;
	              padding:10px 14px;
	              background:#0d6efd;
	              color:white;
	              border-radius:8px;
	              text-decoration:none;">
	        ← Indietro
	    </a>
	</div>
	
</div>

</body>
</html>
