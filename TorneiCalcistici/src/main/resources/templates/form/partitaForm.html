<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Partita</title>

<link rel="stylesheet" th:href="@{/grafica.css}">

</head>

<body>

<div class="container">

    <h1>Nuova Partita</h1>

    <form th:action="@{/partite}" method="post" th:object="${partita}">

        <label>Data e ora</label>
        <input type="datetime-local" th:field="*{dataOra}" required>

        <label>Luogo</label>
        <input type="text" th:field="*{luogo}">

        <label>Goal Home</label>
        <input type="number" min="0" th:field="*{goalsHome}" required>

        <label>Goal Away</label>
        <input type="number" min="0" th:field="*{goalsAway}" required>

		<label>Stato</label>
		<select th:field="*{stato}" required>
		    <option value="" disabled selected>Seleziona stato</option>
		    <option value="PROGRAMMATA">Programm​ata</option>
		    <option value="FINITA">Finita</option>
		</select>

        <!-- TORNEO -->
        <label>Torneo</label>
        <select th:field="*{torneo}" required>
            <option value="" disabled selected>Seleziona torneo</option>
            <option th:each="t : ${torneo}"
                    th:value="${t.id}"
                    th:text="${t.nome}">
            </option>
        </select>

        <!-- HOME -->
        <label>Squadra Casa</label>
        <select th:field="*{squadraHome}" required>
            <option value="" disabled selected>Seleziona squadra home</option>
            <option th:each="s : ${squadra}"
                    th:value="${s.id}"
                    th:text="${s.nome}">
            </option>
        </select>

        <!-- AWAY -->
        <label>Squadra Ospite</label>
        <select th:field="*{squadraAway}" required>
            <option value="" disabled selected>Seleziona squadra away</option>
            <option th:each="s : ${squadra}"
                    th:value="${s.id}"
                    th:text="${s.nome}">
            </option>
        </select>

        <!-- ARBITRO -->
        <label>Arbitro</label>
        <select th:field="*{arbitro}" required>
            <option value="" disabled selected>Seleziona arbitro</option>
            <option th:each="a : ${arbitro}"
                    th:value="${a.id}"
                    th:text="${a.nome}">
            </option>
        </select>

        <button type="submit">Salva Partita</button>

    </form>
	
	<div class="back">
	    <a href="/form/admin" class="btn btn-back">
	        ← Indietro
	    </a>
	</div>

</div>

</body>
</html>
