<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Inserisci Risultato</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #222;
        }

        .match {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .match span {
            color: #0d6efd;
        }

        .row {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #198754;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #157347;
        }

        .back {
            text-align: center;
            margin-top: 20px;
        }

        .back a {
            text-decoration: none;
            color: #0d6efd;
            font-weight: bold;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Inserisci risultato</h1>

	<form th:action="@{/partitaModifica/{id}(id=${partita.id})}" th:object="${partita}" method="post">

		<div class="match">
		    <div>
		        <div>
		            <span th:text="*{squadraHome.nome}"></span>
		            vs
		            <span th:text="*{squadraAway.nome}"></span>
		        </div>

		        <div style="font-size: 14px; color: #666; margin-top: 6px;">
		            Torneo: <span th:text="*{torneo.nome}"></span>
		        </div>
		    </div>
		</div>

        <div class="row">
            <label>Gol Casa</label>
            <input type="number" min="0" th:field="*{goalsHome}">
        </div>

        <div class="row">
            <label>Gol Trasferta</label>
            <input type="number" min="0" th:field="*{goalsAway}">
        </div>

        <div class="row">
            <label>Stato partita</label>
            <select th:field="*{stato}">
                <option value="PROGRAMMATA">Programmata</option>
                <option value="FINITA">Finita</option>
            </select>
        </div>

        <button type="submit">Salva risultato</button>

    </form>

	<div class="back">
	    <a href="/form/admin"
	       style="display:inline-block;
	              margin-top:20px;
	              padding:10px 14px;
	              background:#0d6efd;
	              color:white;
	              border-radius:8px;
	              text-decoration:none;">
	        ← Indietro
	    </a>
	</div>
	
</div>

</body>
</html>
