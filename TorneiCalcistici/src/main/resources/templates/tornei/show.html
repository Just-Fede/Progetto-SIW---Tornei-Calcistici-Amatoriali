<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="UTF-8">
	<title>Dettagli Torneo</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 40px;
			background-color: #f5f5f5;
		}

		.container {
			background: white;
			padding: 20px;
			border-radius: 10px;
			max-width: 700px;
			margin-bottom: 20px;
		}

		h1, h2 {
			margin-top: 0;
		}

		.field {
			margin-bottom: 10px;
		}

		.label {
			font-weight: bold;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 10px;
		}

		th, td {
			padding: 10px;
			border-bottom: 1px solid #ddd;
			text-align: center;
		}

		th {
			background-color: #f0f0f0;
		}

		td:nth-child(2),
		th:nth-child(2) {
			text-align: left;
		}

		tr:hover {
			background-color: #fafafa;
		}

		a {
			text-decoration: none;
		}
	</style>
</head>

<body>

	<div class="container" th:if="${torneo}">
		<h1>Dettagli Torneo</h1>

		<div class="field">
			<span class="label">Nome:</span>
			<span th:text="${torneo.nome}">Nome Torneo</span>
		</div>

		<div class="field">
			<span class="label">Anno:</span>
			<span th:text="${torneo.anno}">2026</span>
		</div>

		<div class="field">
			<span class="label">Descrizione:</span>
			<p th:text="${torneo.descrizione}">Descrizione torneo</p>
		</div>
	</div>

	<div class="container">
		<h2>Squadre partecipanti</h2>

		<div th:if="${#lists.isEmpty(squadre)}">
			Nessuna squadra iscritta
		</div>

		<ul>
			<li th:each="s : ${squadre}">
				<a th:href="@{/squadre/{id}(id=${s.id})}">
					<span th:text="${s.nome}"></span>
				</a>
			</li>
		</ul>
	</div>

	<div class="container">
		<h2>Classifica</h2>

		<table>
			<thead>
				<tr>
					<th>#</th>
					<th>Squadra</th>
					<th>Pt</th>
					<th>G</th>
					<th>GF</th>
					<th>GS</th>
					<th>DR</th>
				</tr>
			</thead>

			<tbody>
				<tr th:each="riga, stat : ${classifica}">
					<td th:text="${stat.count}">1</td>
					<td th:text="${riga[1]}">Squadra</td>
					<td th:text="${riga[2]}">0</td>
					<td th:text="${riga[3]}">0</td>
					<td th:text="${riga[4]}">0</td>
					<td th:text="${riga[5]}">0</td>
					<td th:text="${riga[6]}">0</td>
				</tr>
			</tbody>
		</table>
	</div>

	<a th:href="@{'/tornei/' + ${torneo.id} + '/calendario'}">
		📅 Vai al calendario
		
	</a>

	<div class="back">
	    <a href="/tornei"
	       style="display:inline-block;
	              margin-top:20px;
	              padding:10px 14px;
	              background:#0d6efd;
	              color:white;
	              border-radius:8px;
	              text-decoration:none;">
	        ← Indietro
	    </a>
	</div>
	
</body>
</html>
