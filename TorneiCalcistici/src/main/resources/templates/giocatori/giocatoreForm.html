<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Giocatore</title>
	<link rel="stylesheet" th:href="@{/grafica.css}">

</head>

<body>

<div class="container">

    <h1>Nuovo Giocatore</h1>

    <form th:action="@{/giocatori}" method="post" th:object="${giocatore}">

        <div class="section">
            <label>Nome</label>
            <input type="text" th:field="*{nome}" required>
        </div>

        <div class="section">
            <label>Cognome</label>
            <input type="text" th:field="*{cognome}" required>
        </div>

        <div class="section">
            <label>Data di nascita</label>
            <input type="date" th:field="*{data_nascita}" required>
        </div>

        <div class="section">
            <label>Ruolo</label>
            <input type="text" th:field="*{ruolo}" required>
        </div>

        <div class="section">
            <label>Altezza</label>
            <input type="number" step="0.01" th:field="*{altezza}">
        </div>

        <div class="section">
            <label>Squadra</label>
            <select th:field="*{squadraId}" required>
                <option value="" disabled selected>Seleziona una squadra</option>

                <option th:each="s : ${squadre}"
                        th:value="${s.id}"
                        th:text="${s.nome}">
                </option>
            </select>
        </div>

		<br><br>
		
        <button type="submit">Salva Giocatore</button>

    </form>
	
	<div class="back">
	    <a href="/admin"
	       style="display:inline-block;
	              margin-top:20px;
	              padding:10px 14px;
	              background:#0d6efd;
	              color:white;
	              border-radius:8px;
	              text-decoration:none;">
	        ← Indietro
	    </a>
	</div>
	
</div>

</body>
</html>
